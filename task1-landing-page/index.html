<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teja | Internship Projects</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
        }

        header {
            padding: 30px 20px;
        }

        .logo-section img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .logo-section h2 {
            color: #38bdf8;
            margin-top: 5px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px 20px;
        }

        .card {
            background: #1e293b;
            width: 260px;
            padding: 25px;
            border-radius: 12px;
        }

        .card h3 {
            color: #38bdf8;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 6px;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo-section">
        <img src="logo.png" alt="logo">
        <h2>Oasis Infobyte</h2>
    </div>
</header>

<div class="container">

    <div class="card">
        <h3>Landing Page</h3>
        <a href="task1-landing-page/" class="btn">View</a>
    </div>

    <div class="card">
        <h3>Portfolio Website</h3>
        <a href="task2-portfolio/" class="btn">View</a>
    </div>

    <div class="card">
        <h3>Temperature Converter</h3>
        <a href="task3-temperature-converter/" class="btn">View</a>
    </div>

</div>

<footer>
    © 2026 Teja
</footer>

</body>
</html>
