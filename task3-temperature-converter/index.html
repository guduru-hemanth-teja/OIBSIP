<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3 - ToDo App | Oasis Infobyte</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> My ToDo List</h1>
            <p>Stay organized and boost productivity!</p>
        </header>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Add a new task...">
            <button id="addBtn"><i class="fas fa-plus"></i></button>
        </div>

        <div class="stats">
            <span id="totalTasks">0</span> Tasks | 
            <span id="completedTasks">0</span> Completed
        </div>

        <ul id="todoList"></ul>

        <div class="actions">
            <button id="clearCompleted">Clear Completed</button>
            <button id="clearAll">Clear All</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
